<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0006"/>
      <stop offset="35%" stop-color="#0d000a"/>
      <stop offset="65%" stop-color="#100008"/>
      <stop offset="100%" stop-color="#0a0006"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#6b0d2a" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .p1{opacity:0;animation:fv 0.6s ease 0.0s forwards;}
    .p2{opacity:0;animation:fv 0.6s ease 0.15s forwards;}
    .p3{opacity:0;animation:fv 0.6s ease 0.30s forwards;}
    .p4{opacity:0;animation:fv 0.6s ease 0.45s forwards;}
    .p5{opacity:0;animation:fv 0.6s ease 0.60s forwards;}
    .t1{animation:fu 0.9s ease 0.2s forwards;opacity:0;}
    .t2{animation:fu 0.9s ease 0.45s forwards;opacity:0;}
    .t3{animation:fu 0.9s ease 0.65s forwards;opacity:0;}
    .s1{animation:fu 0.9s ease 0.85s forwards;opacity:0;}
    .s2{animation:fu 0.9s ease 1.0s forwards;opacity:0;}
    .s3{animation:fu 0.9s ease 1.15s forwards;opacity:0;}
    @keyframes fv{from{opacity:0;}to{opacity:1;}}
    @keyframes fu{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
    .scan{animation:scanline 3.5s ease 0.5s forwards;}
    @keyframes scanline{from{transform:translateX(-5px);opacity:0.7;}to{transform:translateX(910px);opacity:0;}}
    .pulse{animation:nodepulse 2s ease-in-out 1.5s infinite alternate;}
    @keyframes nodepulse{from{opacity:0.6;}to{opacity:1;}}
  </style>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>
  <rect width="900" height="220" fill="url(#grid)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="450" cy="90" rx="260" ry="75" fill="#cc0033" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="130" cy="100" r="60" fill="#ff2244" opacity="0.04" filter="url(#glow2)"/>
  <circle cx="770" cy="100" r="60" fill="#ff2244" opacity="0.04" filter="url(#glow2)"/>

  <!-- Scan line sweep on load -->
  <rect class="scan" x="-5" y="0" width="4" height="220" fill="#ff3355" opacity="0.4"/>

  <!-- ═══ LEFT NETWORK DECORATION ═══ -->
  <!-- Connecting lines -->
  <line class="p1" x1="20" y1="110" x2="60" y2="70"  stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p1" x1="20" y1="110" x2="65" y2="140" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p2" x1="60" y1="70"  x2="105" y2="55" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p2" x1="60" y1="70"  x2="110" y2="90" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p3" x1="65" y1="140" x2="110" y2="90" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p3" x1="65" y1="140" x2="105" y2="160" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p4" x1="105" y1="55"  x2="135" y2="90" stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>
  <line class="p4" x1="110" y1="90"  x2="135" y2="90" stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>
  <line class="p5" x1="105" y1="160" x2="135" y2="90" stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>

  <!-- Nodes (circles) -->
  <circle class="p1 pulse" cx="20"  cy="110" r="5"   fill="#ff2244" opacity="0.9" filter="url(#glow)"/>
  <circle class="p2"       cx="60"  cy="70"  r="4"   fill="#cc1133" opacity="0.85" filter="url(#glow)"/>
  <circle class="p2"       cx="65"  cy="140" r="3.5" fill="#cc1133" opacity="0.85" filter="url(#glow)"/>
  <circle class="p3"       cx="105" cy="55"  r="3"   fill="#ff4466" opacity="0.7" filter="url(#glow)"/>
  <circle class="p3"       cx="110" cy="90"  r="4"   fill="#ff2244" opacity="0.8" filter="url(#glow)"/>
  <circle class="p3"       cx="105" cy="160" r="3"   fill="#cc1133" opacity="0.7" filter="url(#glow)"/>
  <circle class="p4"       cx="135" cy="90"  r="3"   fill="#ff6688" opacity="0.6" filter="url(#glow)"/>

  <!-- Node labels -->
  <text class="p2" x="55" y="64" font-family="monospace" font-size="6.5" fill="#ff4466" text-anchor="middle" opacity="0.9">HTML</text>
  <text class="p3" x="110" y="48" font-family="monospace" font-size="6.5" fill="#cc1133" text-anchor="middle" opacity="0.9">CSS</text>
  <text class="p3" x="65" y="155" font-family="monospace" font-size="6.5" fill="#cc1133" text-anchor="middle" opacity="0.9">JS</text>
  <text class="p1" x="20" y="126" font-family="monospace" font-size="6.5" fill="#ff2244" text-anchor="middle" opacity="0.9" filter="url(#glow)">FLASK</text>

  <!-- ═══ RIGHT NETWORK DECORATION (mirrored) ═══ -->
  <line class="p1" x1="880" y1="110" x2="840" y2="70"  stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p1" x1="880" y1="110" x2="835" y2="140" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p2" x1="840" y1="70"  x2="795" y2="55"  stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p2" x1="840" y1="70"  x2="790" y2="90"  stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p3" x1="835" y1="140" x2="790" y2="90"  stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p3" x1="835" y1="140" x2="795" y2="160" stroke="#6b0d1a" stroke-width="1" opacity="0.8"/>
  <line class="p4" x1="795" y1="55"  x2="765" y2="90"  stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>
  <line class="p4" x1="790" y1="90"  x2="765" y2="90"  stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>
  <line class="p5" x1="795" y1="160" x2="765" y2="90"  stroke="#6b0d1a" stroke-width="1" opacity="0.6"/>

  <circle class="p1 pulse" cx="880" cy="110" r="5"   fill="#ff2244" opacity="0.9" filter="url(#glow)"/>
  <circle class="p2"       cx="840" cy="70"  r="4"   fill="#cc1133" opacity="0.85" filter="url(#glow)"/>
  <circle class="p2"       cx="835" cy="140" r="3.5" fill="#cc1133" opacity="0.85" filter="url(#glow)"/>
  <circle class="p3"       cx="795" cy="55"  r="3"   fill="#ff4466" opacity="0.7" filter="url(#glow)"/>
  <circle class="p3"       cx="790" cy="90"  r="4"   fill="#ff2244" opacity="0.8" filter="url(#glow)"/>
  <circle class="p3"       cx="795" cy="160" r="3"   fill="#cc1133" opacity="0.7" filter="url(#glow)"/>
  <circle class="p4"       cx="765" cy="90"  r="3"   fill="#ff6688" opacity="0.6" filter="url(#glow)"/>

  <text class="p2" x="845" y="64"  font-family="monospace" font-size="6.5" fill="#ff4466" text-anchor="middle" opacity="0.9">PYTHON</text>
  <text class="p3" x="795" y="48"  font-family="monospace" font-size="6.5" fill="#cc1133" text-anchor="middle" opacity="0.9">MP3</text>
  <text class="p3" x="835" y="155" font-family="monospace" font-size="6.5" fill="#cc1133" text-anchor="middle" opacity="0.9">PDF</text>
  <text class="p1" x="880" y="126" font-family="monospace" font-size="6.5" fill="#ff2244" text-anchor="middle" opacity="0.9" filter="url(#glow)">.in</text>

  <!-- ═══ CENTRE TEXT ═══ -->

  <!-- Main title -->
  <text class="t1" x="450" y="76"
    font-family="'Arial Black', Impact, sans-serif"
    font-size="38" font-weight="900" fill="white"
    text-anchor="middle" letter-spacing="6" filter="url(#softglow)">NETHUB</text>

  <!-- Subtitle -->
  <text class="t2" x="450" y="102"
    font-family="Arial, sans-serif" font-size="12" fill="#ff4466"
    text-anchor="middle" letter-spacing="2.5">Flask · HTML · Python · Music · Movies · Novels</text>

  <!-- Divider -->
  <line x1="195" y1="118" x2="705" y2="118" stroke="#6b0d1a" stroke-width="0.5" opacity="0.6"/>

  <!-- Stats row -->
  <text class="s1" x="285" y="140" font-family="monospace" font-size="11" fill="#ff4466" text-anchor="middle" font-weight="700">4 Content Sections</text>
  <text class="s1" x="285" y="155" font-family="monospace" font-size="9" fill="#6b0d1a" text-anchor="middle">Songs · Novels · Movies · Forms</text>

  <line x1="365" y1="126" x2="365" y2="162" stroke="#3d0010" stroke-width="0.5"/>

  <text class="s2" x="450" y="140" font-family="monospace" font-size="11" fill="#ff4466" text-anchor="middle" font-weight="700">Music Player · Genre Selector</text>
  <text class="s2" x="450" y="155" font-family="monospace" font-size="9" fill="#6b0d1a" text-anchor="middle">Pop · Rock · Jazz · Play · Pause · Stop</text>

  <line x1="535" y1="126" x2="535" y2="162" stroke="#3d0010" stroke-width="0.5"/>

  <text class="s3" x="618" y="140" font-family="monospace" font-size="11" fill="#ff4466" text-anchor="middle" font-weight="700">Email Form · Flask Routes</text>
  <text class="s3" x="618" y="155" font-family="monospace" font-size="9" fill="#6b0d1a" text-anchor="middle">Jinja2 Templates · REST POST</text>

  <!-- Bottom tag -->
  <text class="t3" x="450" y="208"
    font-family="'Courier New', monospace" font-size="9.5"
    fill="#3d0010" text-anchor="middle" letter-spacing="1.5">NETHUB.IN  ·  FULL STACK WEB APPLICATION  ·  FLASK + HTML + PYTHON</text>
</svg>
